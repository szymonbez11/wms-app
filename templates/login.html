<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial; background:#f3f4f6;">

<form method="post" action="/login"
      style="background:white; padding:20px; border-radius:12px; width:300px;">

    <h2>Logowanie</h2>

    <input type="text"
           name="user"
           placeholder="Imię i nazwisko"
           required
           style="width:100%; padding:10px; margin-bottom:10px;">

    <button type="submit"
            style="width:100%; padding:10px; background:#2563eb; color:white; border:none;">
        Zaloguj
    </button>

</form>

</body>
</html>
