<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ADMIN WMS DASHBOARD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    padding: 15px;
    background: #111827;
    font-size: 18px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 15px;
}

.card {
    background: #1f2937;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.title {
    font-weight: bold;
    margin-bottom: 10px;
}

.badge {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
}

.free { background: gray; }
.progress { background: orange; }
.done { background: green; }

.progressbar {
    width: 100%;
    background: #374151;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.bar {
    height: 10px;
    background: #22c55e;
}

.small {
    font-size: 12px;
    opacity: 0.8;
}

.timer {
    margin-top: 8px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
    <div>🧠 WMS ADMIN DASHBOARD</div>
    <div>👤 {{ user }}</div>
</div>

<div class="container" id="app"></div>

<script>
async function load() {
    const res = await fetch("/api/admin_full");
    const data = await res.json();

    const app = document.getElementById("app");
    app.innerHTML = "";

    for (let key in data) {
        const o = data[key];

        let statusClass = o.status === "free" ? "free" :
                          o.status === "progress" ? "progress" : "done";

        let time = Math.floor(o.time);
        let min = Math.floor(time / 60);
        let sec = time % 60;

        app.innerHTML += `
        <div class="card">
            <div class="title">📦 ${o.file}</div>

            <div>
                Status:
                <span class="badge ${statusClass}">
                    ${o.status}
                </span>
            </div>

            <div class="small">👷 ${o.worker || "brak"}</div>
            <div class="small">🏢 ${o.contractor || ""}</div>

            <div class="timer">⏱ ${min}m ${sec}s</div>

            <div class="progressbar">
                <div class="bar" style="width:${o.progress}%"></div>
            </div>

            <div class="small">${o.progress}%</div>
        </div>
        `;
    }
}

load();
setInterval(load, 2000);
</script>

</body>
</html>
